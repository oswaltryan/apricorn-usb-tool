name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Black (format check)
        run: uv run --extra dev pre-commit run black --all-files

      - name: Ruff (lint)
        run: uv run --extra dev pre-commit run ruff --all-files

      - name: Ruff Format (check)
        run: uv run --extra dev pre-commit run ruff-format --all-files

      - name: Mypy (type check)
        run: uv run --extra dev pre-commit run mypy --all-files

      - name: Pytest
        run: uv run --extra dev pytest -q
