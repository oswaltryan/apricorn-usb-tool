name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: quality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --extra dev

      # Keep quality checks centralized in pre-commit to avoid CI/config drift.
      - name: Validate pre-commit config
        run: uv run --extra dev pre-commit validate-config

      - name: Run pre-commit (single source of truth)
        env:
          SKIP: bump-project-version
        run: uv run --extra dev pre-commit run --all-files --show-diff-on-failure --color=always
