name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      project_version: ${{ steps.versions.outputs.project_version }}
      expected_tag: ${{ steps.versions.outputs.expected_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: versions
        name: Resolve repo versions
        shell: bash
        run: |
          set -euo pipefail
          version=$(python3 scripts/project_version.py read)
          expected_tag="v${version}"

          {
            echo "project_version=${version}"
            echo "expected_tag=${expected_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          project_version="${{ steps.versions.outputs.project_version }}"
          expected_tag="${{ steps.versions.outputs.expected_tag }}"

          if [[ "$tag" != "$expected_tag" ]]; then
            echo "Release tag ${tag} does not match pyproject.toml version ${project_version}." >&2
            echo "Expected release tag: ${expected_tag}" >&2
            exit 1
          fi

  build:
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, macos-latest, windows-latest]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        run: choco upgrade wixtoolset -y --no-progress

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0 dpkg-dev

      - name: Build (Linux)
        if: runner.os == 'Linux'
        env:
          USB_TOOL_MAX_GLIBC: "2.31"
        run: |
          chmod +x build/build_linux.sh build/build_linux_installer.sh installers/linux/install.sh installers/linux/uninstall.sh installers/linux/debian/DEBIAN/config installers/linux/debian/DEBIAN/postinst installers/linux/debian/DEBIAN/postrm installers/linux/debian/DEBIAN/prerm
          ./build/build_linux.sh

      - name: Build Linux installer
        if: runner.os == 'Linux'
        run: |
          SKIP_PYINSTALLER=1 ./build/build_linux_installer.sh

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x build/build_mac.sh build/build_macos_pkg.sh installers/macos/scripts/postinstall
          ./build/build_mac.sh

      - name: Build macOS installer
        if: runner.os == 'macOS'
        run: |
          ./build/build_macos_pkg.sh --skip-pyinstaller

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: build\build_windows.bat
        shell: cmd

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./build/build_windows_msi.ps1 -SkipPyInstaller

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Force -Path dist\usb-windows.exe -DestinationPath release\usb-windows.zip
          Copy-Item dist\usb-tool-*-x64.msi release\

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          tar -czf release/usb-macos.tar.gz -C dist usb-macos
          cp dist/usb-tool-*-macos.pkg release/

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          tar -czf release/usb-linux.tar.gz -C dist usb-linux
          cp dist/usb-tool-*-amd64.deb release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usb-${{ runner.os }}
          path: release/*

  release:
    needs: [validate-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm validated tag
        run: |
          echo "Releasing ${{ github.ref_name }}"
          echo "Project version: ${{ needs.validate-version.outputs.project_version }}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: usb-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
